<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111111;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#070707;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF72;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8944E;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="18" fill="url(#bg)"/>
  
  <!-- Double border — outer -->
  <rect x="2.5" y="2.5" width="95" height="95" rx="16" fill="none" stroke="#C9A96E" stroke-width="0.8" opacity="0.5"/>
  <!-- Double border — inner hairline -->
  <rect x="5" y="5" width="90" height="90" rx="14" fill="none" stroke="#C9A96E" stroke-width="0.3" opacity="0.3"/>

  <!-- M letterform — hand-crafted paths for clean serif M -->
  <!-- Built on a 60x60 grid centered in the 100x100 canvas (origin 20,18) -->
  
  <!-- Left vertical stem -->
  <rect x="18" y="20" width="9" height="60" fill="url(#gold)"/>
  <!-- Left top serif -->
  <rect x="13" y="20" width="19" height="4" rx="0.5" fill="url(#gold)"/>
  <!-- Left bottom serif -->
  <rect x="13" y="76" width="19" height="4" rx="0.5" fill="url(#gold)"/>
  
  <!-- Right vertical stem -->
  <rect x="73" y="20" width="9" height="60" fill="url(#gold)"/>
  <!-- Right top serif -->
  <rect x="68" y="20" width="19" height="4" rx="0.5" fill="url(#gold)"/>
  <!-- Right bottom serif -->
  <rect x="68" y="76" width="19" height="4" rx="0.5" fill="url(#gold)"/>

  <!-- Left diagonal — top of left stem down to center -->
  <polygon points="27,20 38,20 55,54 44,54" fill="url(#gold)"/>
  
  <!-- Right diagonal — center up to top of right stem -->
  <polygon points="45,54 56,54 73,20 62,20" fill="url(#gold)"/>

</svg>
